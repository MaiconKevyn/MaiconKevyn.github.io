    <text x="36" y="144" font-size="24" fill="#fff7ed">Streamlit insight dashboard</text>
  </g>
  <g transform="translate(670 470)" font-family="JetBrains Mono, monospace">
    <rect width="410" height="160" rx="24" fill="rgba(5,18,24,0.72)" stroke="#06b6d4"/>
    <text x="36" y="62" font-size="32" fill="#67e8f9">ZERO-SHOT</text>
    <text x="36" y="112" font-size="24" fill="#ecfeff">sentiment + topics</text>
  </g>
  <path d="M90 680h1020" stroke="url(#accent)" stroke-width="4"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Amazon Feedback Analysis</title>
  <desc id="desc">Applied NLP project card for Maicon Kevyn portfolio.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b1105"/>
      <stop offset="60%" stop-color="#2d1608"/>
      <stop offset="100%" stop-color="#081823"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <g opacity="0.16">
    <circle cx="910" cy="230" r="170" fill="none" stroke="#fdba74"/>
    <circle cx="910" cy="230" r="120" fill="none" stroke="#67e8f9"/>
    <circle cx="910" cy="230" r="70" fill="none" stroke="#fdba74"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" fill="#fff7ed">
    <text x="90" y="120" font-size="34" letter-spacing="8" fill="#fdba74">APPLIED NLP</text>
    <text x="90" y="220" font-size="84" font-weight="700">AMAZON FEEDBACK</text>
    <text x="90" y="305" font-size="84" font-weight="700">ANALYSIS</text>
    <text x="90" y="390" font-size="34" fill="#fee2c1">Zero-shot sentiment + topic discovery + dashboard exploration</text>
  </g>
  <g transform="translate(90 470)" font-family="JetBrains Mono, monospace">
    <rect width="440" height="170" rx="24" fill="rgba(29,17,7,0.76)" stroke="#f97316"/>

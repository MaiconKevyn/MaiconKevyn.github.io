<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">RAG Evaluation Lab</title>
  <desc id="desc">RAG evaluation platform project card for Maicon Kevyn portfolio.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#02131d"/>
      <stop offset="55%" stop-color="#08304a"/>
      <stop offset="100%" stop-color="#04170f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
